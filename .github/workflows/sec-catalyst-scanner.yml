name: SEC Catalyst Scanner

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sec-catalyst-scanner
  cancel-in-progress: true

jobs:
  run-sec-catalyst-scanner:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: src:.
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package requirements if present
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate SEC package
        run: python scripts/validate_sec_catalyst_package.py

      - name: Run SEC Catalyst Scanner
        run: python scripts/run_sec_catalyst_scanner.py

      - name: Validate generated JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          required = [
              "docs/data/prediction_engine/sec_catalysts.json",
              "docs/data/prediction_engine/sec_catalyst_health.json",
          ]
          for item in required:
              path = Path(item)
              if not path.exists():
                  raise SystemExit(f"Missing required output: {item}")
              json.loads(path.read_text(encoding="utf-8"))
          payload = json.loads(Path("docs/data/prediction_engine/sec_catalysts.json").read_text())
          print("SEC status:", payload.get("status"))
          print("Counts:", payload.get("counts"))
          PY

      - name: Commit SEC catalyst data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/data/prediction_engine state/prediction_engine
          git commit -m "Update SEC catalyst scanner data" || echo "No changes to commit"
          git push
