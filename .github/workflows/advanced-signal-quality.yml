name: Advanced Signal Quality

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: advanced-signal-quality
  cancel-in-progress: true

jobs:
  run-advanced-signal-quality:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: src:.

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package requirements if present
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Advanced Signal Quality
        run: python scripts/run_advanced_signal_quality.py

      - name: Validate quality outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          required = [
              "docs/data/prediction_engine/signal_dashboard_quality_enriched.json",
              "docs/data/prediction_engine/advanced_signal_quality.json",
              "docs/data/prediction_engine/advanced_signal_quality_health.json",
          ]

          for item in required:
              path = Path(item)
              if not path.exists():
                  raise SystemExit(f"Missing required output: {item}")
              json.loads(path.read_text(encoding="utf-8"))

          quality = json.loads(Path("docs/data/prediction_engine/advanced_signal_quality.json").read_text())
          print("Signals:", quality.get("counts", {}).get("signals"))
          print("Quality approved:", quality.get("counts", {}).get("quality_approved"))
          print("Market regime:", quality.get("market_regime", {}).get("regime"))
          PY

      - name: Commit quality data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/data/prediction_engine state/prediction_engine
          git commit -m "Update advanced signal quality" || echo "No changes to commit"
          git push
