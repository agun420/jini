name: Runtime Worker Validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-runtime-worker:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: src:.
      PAPER_ORDER_SUBMISSION_ENABLED: "false"
      MANUAL_APPROVAL_REQUIRED: "true"
      ENGINE_KILL_SWITCH: "false"
      RUNTIME_LOOP_FOREVER: "false"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements if present
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate runtime worker package
        run: python scripts/validate_runtime_worker_package.py

      - name: Run runtime worker once
        run: python scripts/run_runtime_worker.py

      - name: Check runtime outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          required = [
              "docs/data/prediction_engine/runtime_heartbeat.json",
              "docs/data/prediction_engine/runtime_status.json",
              "state/prediction_engine/runtime_status.json",
          ]

          for item in required:
              path = Path(item)
              if not path.exists():
                  raise SystemExit(f"Missing output: {item}")
              json.loads(path.read_text())

          print("Runtime worker outputs validated.")
          PY
