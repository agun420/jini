name: Full Validation Suite

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-validation-suite
  cancel-in-progress: true

jobs:
  run-full-validation-suite:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: src:.

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package requirements if present
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run full validation suite
        run: python scripts/run_full_validation_suite.py
