name: Paper Execution Gate

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: paper-execution-gate
  cancel-in-progress: true

jobs:
  run-paper-execution-gate:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: src:.
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      PAPER_ORDER_SUBMISSION_ENABLED: "false"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package requirements if present
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Paper Execution Gate
        run: python scripts/run_paper_execution_gate.py

      - name: Validate paper gate files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          required = [
              "state/prediction_engine/paper_order_plan.json",
              "docs/data/prediction_engine/paper_order_plan.json",
              "docs/data/prediction_engine/paper_execution_gate_health.json",
          ]

          for item in required:
              path = Path(item)
              if not path.exists():
                  raise SystemExit(f"Missing required output: {item}")
              json.loads(path.read_text(encoding="utf-8"))

          payload = json.loads(Path("docs/data/prediction_engine/paper_order_plan.json").read_text())
          print("Order plan created:", payload.get("order_plan", {}).get("created"))
          print("Submission enabled:", payload.get("safety", {}).get("order_submission_enabled"))
          print("Submitted:", payload.get("submission", {}).get("submitted"))
          print("Selected:", (payload.get("selected_candidate") or {}).get("ticker"))
          print("Risk mode:", payload.get("adaptive_guard", {}).get("risk_mode"))
          PY

      - name: Commit paper gate data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add state/prediction_engine docs/data/prediction_engine
          git commit -m "Update paper execution gate plan" || echo "No changes to commit"
          git push
