name: Signal Journal Learning Base

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: signal-journal-learning-base
  cancel-in-progress: true

jobs:
  run-signal-journal:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: src:.

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package requirements if present
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Signal Journal
        run: python scripts/run_signal_journal.py

      - name: Validate generated learning JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          required = [
              "state/prediction_engine/signal_history.json",
              "state/prediction_engine/learning_state.json",
              "docs/data/prediction_engine/learning.json",
              "docs/data/prediction_engine/signal_journal_health.json",
          ]

          for item in required:
              path = Path(item)
              if not path.exists():
                  raise SystemExit(f"Missing required output: {item}")
              json.loads(path.read_text(encoding="utf-8"))

          payload = json.loads(Path("state/prediction_engine/signal_history.json").read_text())
          print("Signal journal rows:", payload.get("row_count"))
          PY

      - name: Commit learning data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/data/prediction_engine state/prediction_engine
          git commit -m "Update signal journal learning data" || echo "No changes to commit"
          git push
