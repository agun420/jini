name: Final Repo Audit

on:
  workflow_dispatch:
  schedule:
    # After market close during daylight saving time.
    - cron: "30 21 * * 1-5"

permissions:
  contents: write

concurrency:
  group: final-repo-audit
  cancel-in-progress: true

jobs:
  run-final-repo-audit:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: src:.

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package requirements if present
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Final Repo Audit
        run: python scripts/run_final_repo_audit.py

      - name: Validate audit output
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          required = [
              "docs/data/prediction_engine/final_repo_audit.json",
              "state/prediction_engine/final_repo_audit.json",
          ]

          for item in required:
              path = Path(item)
              if not path.exists():
                  raise SystemExit(f"Missing required output: {item}")
              json.loads(path.read_text(encoding="utf-8"))

          audit = json.loads(Path("docs/data/prediction_engine/final_repo_audit.json").read_text())
          print("Audit status:", audit.get("status"))
          print("Audit score:", audit.get("score"))
          if audit.get("status") == "FAIL":
              raise SystemExit("Final repo audit failed")
          PY

      - name: Commit audit data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/data/prediction_engine state/prediction_engine
          git commit -m "Update final repo audit" || echo "No changes to commit"
          git push
