name: Master Free Scanner Pipeline

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: master-free-scanner-pipeline
  cancel-in-progress: true

jobs:
  run-master-free-scanner-pipeline:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: src:.
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      PAPER_ORDER_SUBMISSION_ENABLED: "false"
      OUTCOME_LOOKBACK_DAYS: "7"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package requirements if present
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Master Free Scanner Pipeline
        run: python scripts/run_master_free_scanner_pipeline.py

      - name: Validate master pipeline outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          required = [
              "docs/data/prediction_engine/master_pipeline_health.json",
              "state/prediction_engine/master_pipeline_state.json",
              "docs/data/prediction_engine/free_scanner.json",
              "docs/data/prediction_engine/signal_dashboard.json",
          ]

          for item in required:
              path = Path(item)
              if not path.exists():
                  raise SystemExit(f"Missing required output: {item}")
              json.loads(path.read_text(encoding="utf-8"))

          health = json.loads(Path("docs/data/prediction_engine/master_pipeline_health.json").read_text())
          print("Pipeline status:", health.get("status"))
          print("Summary:", health.get("summary"))
          if health.get("status") != "PASS":
              raise SystemExit("Master pipeline did not pass")
          PY

      - name: Commit pipeline data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/data/prediction_engine state/prediction_engine
          git commit -m "Update master free scanner pipeline data" || echo "No changes to commit"
          git push
