name: Outcome Labeler

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: outcome-labeler
  cancel-in-progress: true

jobs:
  run-outcome-labeler:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: src:.
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      OUTCOME_LOOKBACK_DAYS: "7"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package requirements if present
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Outcome Labeler
        run: python scripts/run_outcome_labeler.py

      - name: Validate outcome files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          required = [
              "state/prediction_engine/outcome_labels.json",
              "docs/data/prediction_engine/outcomes.json",
              "docs/data/prediction_engine/outcome_labeler_health.json",
          ]

          for item in required:
              path = Path(item)
              if not path.exists():
                  raise SystemExit(f"Missing required output: {item}")
              json.loads(path.read_text(encoding="utf-8"))

          payload = json.loads(Path("docs/data/prediction_engine/outcomes.json").read_text())
          print("Rows labeled:", payload.get("summary", {}).get("total_signals_labeled"))
          print("Alpaca bars used:", payload.get("alpaca_bars_used"))
          print("Outcomes:", payload.get("summary", {}).get("outcomes_by_label"))
          PY

      - name: Commit outcome data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add state/prediction_engine docs/data/prediction_engine
          git commit -m "Update outcome labels" || echo "No changes to commit"
          git push
