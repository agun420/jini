name: Free Scanner Normalizer

on:
  workflow_dispatch:
  schedule:
    # NY market hours during daylight saving time:
    # 9:30 AM - 9:55 AM ET
    - cron: "30-59/5 13 * * 1-5"
    # 10:00 AM - 3:55 PM ET
    - cron: "*/5 14-19 * * 1-5"

permissions:
  contents: write

concurrency:
  group: free-scanner-normalizer
  cancel-in-progress: true

jobs:
  run-free-scanner-normalizer:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: src:.

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package requirements if present
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Free Scanner Normalizer
        run: python scripts/run_free_scanner_normalizer.py

      - name: Validate generated JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          required = [
              "docs/data/prediction_engine/free_scanner.json",
              "docs/data/prediction_engine/signal_dashboard.json",
              "docs/data/prediction_engine/scanner_health.json",
              "docs/data/prediction_engine/social_sentiment.json",
          ]

          for item in required:
              path = Path(item)
              if not path.exists():
                  raise SystemExit(f"Missing required output: {item}")
              json.loads(path.read_text(encoding="utf-8"))

          payload = json.loads(Path("docs/data/prediction_engine/free_scanner.json").read_text())
          print("Rows:", payload.get("counts", {}).get("total"))
          print("Real rows:", payload.get("counts", {}).get("real_rows"))
          print("Placeholder rows:", payload.get("counts", {}).get("placeholder_rows"))
          print("Trade eligible:", payload.get("counts", {}).get("trade_eligible"))
          print("Used placeholders:", payload.get("used_placeholders"))
          PY

      - name: Commit dashboard data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/data/prediction_engine state/prediction_engine
          git commit -m "Update free scanner normalizer data" || echo "No changes to commit"
          git push
