name: Master Paid Alpaca Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "30-59/5 13 * * 1-5"
    - cron: "*/5 14-19 * * 1-5"
    - cron: "10 21 * * 1-5"

permissions:
  contents: write

concurrency:
  group: master-paid-alpaca-pipeline
  cancel-in-progress: true

jobs:
  run-master-paid-alpaca-pipeline:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: src:.
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      ALPACA_DATA_FEED: "sip"
      ALPACA_MAX_SYMBOLS: "500"
      ALPACA_CHUNK_SIZE: "100"
      ALPACA_BAR_TIMEFRAME: "1Min"
      ALPACA_LOOKBACK_MINUTES: "390"
      ALPACA_RVOL_BASELINE_DAYS: "20"
      ALPACA_NEWS_ENABLED: "true"
      ALPACA_NEWS_LOOKBACK_HOURS: "24"
      ALPACA_NEWS_LIMIT: "50"
      PAPER_ORDER_SUBMISSION_ENABLED: "false"
      OUTCOME_LOOKBACK_DAYS: "7"
      ACCOUNT_TYPE: "unknown"
      MANUAL_APPROVAL_REQUIRED: "true"
      ENGINE_KILL_SWITCH: "false"
      DAILY_LOSS_CAP_DOLLARS: "150"
      MAX_REAL_TRADE_NOTIONAL: "250"
      MIN_PAPER_OUTCOMES_BEFORE_REAL: "50"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package requirements if present
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run Alpaca Paid Market Scanner
        run: python scripts/run_alpaca_paid_market_scanner.py

      - name: Run SEC Catalyst Scanner
        run: |
          if [ -f scripts/run_sec_catalyst_scanner.py ]; then python scripts/run_sec_catalyst_scanner.py || true; fi
          if [ -f scripts/repair_sec_health.py ]; then python scripts/repair_sec_health.py || true; fi

      - name: Run FINRA Short Pressure Scanner
        run: |
          if [ -f scripts/run_finra_short_pressure_scanner.py ]; then python scripts/run_finra_short_pressure_scanner.py || true; fi

      - name: Run Alpaca News Scanner
        run: python scripts/run_alpaca_news_scanner.py

      - name: Run Advanced Signal Quality
        run: |
          if [ -f scripts/run_advanced_signal_quality.py ]; then python scripts/run_advanced_signal_quality.py; fi

      - name: Run Halt LULD Circuit Guard
        run: |
          if [ -f scripts/run_halt_luld_circuit_guard.py ]; then python scripts/run_halt_luld_circuit_guard.py; fi

      - name: Run Signal Journal
        run: |
          if [ -f scripts/run_signal_journal.py ]; then python scripts/run_signal_journal.py; fi

      - name: Run Outcome Labeler
        run: |
          if [ -f scripts/run_outcome_labeler.py ]; then python scripts/run_outcome_labeler.py || true; fi

      - name: Run Adaptive Guard
        run: |
          if [ -f scripts/run_adaptive_guard.py ]; then python scripts/run_adaptive_guard.py; fi

      - name: Run Paper Execution Gate Plan
        run: |
          if [ -f scripts/run_paper_execution_gate.py ]; then python scripts/run_paper_execution_gate.py; fi

      - name: Run Slippage Fill Tracker
        run: |
          if [ -f scripts/run_slippage_fill_tracker.py ]; then python scripts/run_slippage_fill_tracker.py; fi

      - name: Run Real Money Readiness Guard
        run: |
          if [ -f scripts/run_real_money_readiness_guard.py ]; then python scripts/run_real_money_readiness_guard.py; fi

      - name: Run Final Repo Audit
        run: |
          if [ -f scripts/run_final_repo_audit.py ]; then python scripts/run_final_repo_audit.py || true; fi

      # V3 scoring chain — runs after the paid scanner so enrichment reads fresh data.
      # Produces the phase gate verdict that drives the dashboard "Updated" timestamp.
      - name: Run V3 Tomorrow Morning Command Pack
        run: python scripts/run_v3_tomorrow_morning_command_pack.py || true

      - name: Run V3 Hard Safety Lock
        run: python scripts/run_v3_hard_safety_lock.py || true

      - name: Run V3 Phase Gate Verdict
        run: python scripts/run_v3_phase_gate_verdict.py || true

      - name: Commit paid Alpaca pipeline data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/data/prediction_engine state/prediction_engine
          git commit -m "Update paid Alpaca scanner pipeline data" || echo "No changes to commit"
          git push
