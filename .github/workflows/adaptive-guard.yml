name: Adaptive Guard

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: adaptive-guard
  cancel-in-progress: true

jobs:
  run-adaptive-guard:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: src:.

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package requirements if present
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Adaptive Guard
        run: python scripts/run_adaptive_guard.py

      - name: Validate adaptive guard files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          required = [
              "state/prediction_engine/adaptive_guard_state.json",
              "docs/data/prediction_engine/adaptive_guard.json",
              "docs/data/prediction_engine/adaptive_guard_health.json",
          ]

          for item in required:
              path = Path(item)
              if not path.exists():
                  raise SystemExit(f"Missing required output: {item}")
              json.loads(path.read_text(encoding="utf-8"))

          payload = json.loads(Path("docs/data/prediction_engine/adaptive_guard.json").read_text())
          print("Risk mode:", payload.get("guard", {}).get("risk_mode"))
          print("Allow new entries:", payload.get("guard", {}).get("allow_new_entries"))
          print("Min score:", payload.get("guard", {}).get("min_score_required"))
          print("Max notional:", payload.get("guard", {}).get("max_notional_per_trade"))
          print("Reasons:", payload.get("guard", {}).get("reasons"))
          PY

      - name: Commit adaptive guard data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add state/prediction_engine docs/data/prediction_engine
          git commit -m "Update adaptive guard state" || echo "No changes to commit"
          git push
