name: FINRA Short-Pressure Scanner

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: finra-short-pressure-scanner
  cancel-in-progress: true

jobs:
  run-finra-short-pressure:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: src:.
      FINRA_USER_AGENT: free-scanner-finra-layer/1.0

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package requirements if present
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate FINRA package
        run: python scripts/validate_finra_short_pressure_package.py

      - name: Run FINRA short-pressure scanner
        run: python scripts/run_finra_short_pressure_scanner.py

      - name: Validate generated JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          required = [
              "docs/data/prediction_engine/finra_short_pressure.json",
              "docs/data/prediction_engine/finra_short_pressure_health.json",
              "docs/data/prediction_engine/signal_dashboard_finra_enriched.json",
              "docs/data/prediction_engine/free_scanner_finra_enriched.json",
          ]
          for item in required:
              path = Path(item)
              if not path.exists():
                  raise SystemExit(f"Missing required output: {item}")
              json.loads(path.read_text(encoding="utf-8"))

          payload = json.loads(Path("docs/data/prediction_engine/finra_short_pressure.json").read_text())
          print("FINRA status:", payload.get("status"))
          print("Trade date:", payload.get("trade_date"))
          print("Counts:", payload.get("counts"))
          PY

      - name: Commit FINRA short-pressure data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/data/prediction_engine state/prediction_engine
          git commit -m "Update FINRA short-pressure data" || echo "No changes to commit"
          git push
